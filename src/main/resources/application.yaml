server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
      open-in-view: false

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

app:
  upload:
    directory: uploads
    originals-directory: uploads/originals

  token:
    expiration: 3600

    
